function randomAddress() {
  return '0x' + Array.from({length: 40}, () => Math.floor(Math.random() * 16).toString(16)).join('');
}
function shortAddress(addr) {
  return addr.slice(0, 6) + '...' + addr.slice(-4);
}

// ============ 유틸 함수 ============
function log(msg, type = 'info') {
  const colors = { info: 'text-neutral-300', success: 'text-emerald-400', error: 'text-rose-400', warning: 'text-amber-400' };
  const line = document.createElement('div');
  line.className = 'log-line ' + (colors[type] || colors.info);
  line.textContent = msg;
  const area = document.getElementById('logArea');
  area.appendChild(line);
  area.parentElement.scrollTop = area.parentElement.scrollHeight;
}

function clearLog() {
  document.getElementById('logArea').innerHTML = '';
}

function setButtonsDisabled(disabled) {
  ['seedBtn', 'resetBtn', 'deleteBtn'].forEach(id => {
    const btn = document.getElementById(id);
    btn.disabled = disabled;
    btn.style.opacity = disabled ? '0.5' : '1';
    btn.style.cursor = disabled ? 'not-allowed' : 'pointer';
  });
}

// ============ 상태 새로고침 ============
async function refreshStatus() {
  try {
    const snap = await db.ref('bounties').once('value');
    const data = snap.val() || {};
    const arr = Object.values(data);
    const total = arr.length;
    const open = arr.filter(b => b.status === 'open').length;
    const progress = arr.filter(b => b.status === 'progress').length;
    const review = arr.filter(b => b.status === 'review').length;
    const done = arr.filter(b => b.status === 'done').length;
    
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statOpen').textContent = open;
    document.getElementById('statProgress').textContent = progress + review;
    document.getElementById('statDone').textContent = done;
  } catch (e) {
    log('상태 조회 실패: ' + e.message, 'error');
  }
}

// ============ 시드 데이터 채우기 ============
async function seedData() {
  setButtonsDisabled(true);
  clearLog();
  log('$ bounx seed --insert', 'info');
  log('시드 데이터 등록 시작...', 'info');
  
  let success = 0;
  let failed = 0;
  
  try {
    const now = Date.now();
    
    for (let i = 0; i < SEED_BOUNTIES.length; i++) {
      const seed = SEED_BOUNTIES[i];
      const requester = FAKE_USERS[Math.floor(Math.random() * FAKE_USERS.length)];
      const ageMinutes = Math.floor(Math.random() * 60 * 24 * 3); // 0-3일 전
      const createdAt = now - (ageMinutes * 60 * 1000);
      
      const bountyRef = db.ref('bounties').push();
      const bounty = {
        id: bountyRef.key,
        title: seed.title,
        categoryId: seed.categoryId,
        desc: seed.desc,
        reward: seed.reward,
        deadline: seed.deadline,
        status: seed.status,
        requester: requester.address,
        requesterShort: requester.shortAddress,
        createdAt: createdAt,
        txHash: '0x' + Math.random().toString(16).slice(2, 18),
        likes: seed.likes || 0,
        isSeed: true, // 시드 데이터 표시
      };
      
      // 진행 중이거나 검토/완료 상태는 작업자 필요
      if (['progress', 'review', 'done'].includes(seed.status)) {
        let worker;
        do {
          worker = FAKE_USERS[Math.floor(Math.random() * FAKE_USERS.length)];
        } while (worker.address === requester.address);
        
        bounty.worker = worker.address;
        bounty.workerShort = worker.shortAddress;
        bounty.appliedAt = createdAt + 60000 * 30; // 30분 후 신청
      }
      
      // 검토/완료 상태는 결과물 필요
      if (['review', 'done'].includes(seed.status) || seed.hasSubmission) {
        bounty.submission = {
          summary: SAMPLE_SUBMISSIONS[seed.categoryId] || '결과물을 제출합니다.',
          proofBundle: '0x' + Math.random().toString(16).slice(2, 18),
          submittedAt: createdAt + 60000 * 60 * 2, // 2시간 후 제출
        };
      }
      
      // 완료 상태
      if (seed.status === 'done') {
        bounty.completedAt = createdAt + 60000 * 60 * 4; // 4시간 후 완료
      }
      
      // 좋아요 시뮬레이션
      if (seed.likes && seed.likes > 0) {
        const likedBy = {};
        const shuffled = [...FAKE_USERS].sort(() => Math.random() - 0.5);
        for (let j = 0; j < Math.min(seed.likes, FAKE_USERS.length); j++) {
          likedBy[shuffled[j].address] = true;
        }
        bounty.likedBy = likedBy;
      }
      
      try {
        await bountyRef.set(bounty);
        success++;
        log('✓ [' + (i+1) + '/' + SEED_BOUNTIES.length + '] ' + seed.title.slice(0, 40) + (seed.title.length > 40 ? '...' : ''), 'success');
      } catch (e) {
        failed++;
        log('✗ 실패: ' + seed.title.slice(0, 30) + ' - ' + e.message, 'error');
      }
    }
    
    log('', 'info');
    log('등록 완료: ' + success + '개 성공' + (failed > 0 ? ', ' + failed + '개 실패' : ''), 'success');
    log('메인 페이지로 가서 확인해보세요!', 'success');
    
    await refreshStatus();
  } catch (e) {
    log('전체 작업 실패: ' + e.message, 'error');
  } finally {
    setButtonsDisabled(false);
  }
}

// ============ 전체 삭제 ============
async function deleteAll() {
  if (!confirm('정말 모든 바운티를 삭제할까요? 사용자가 등록한 것까지 다 삭제됩니다!')) return;
  
  setButtonsDisabled(true);
  clearLog();
  log('$ bounx seed --delete-all', 'warning');
  log('전체 삭제 중...', 'warning');
  
  try {
    await db.ref('bounties').remove();
    log('✓ 모든 바운티 삭제 완료', 'success');
    await refreshStatus();
  } catch (e) {
    log('삭제 실패: ' + e.message, 'error');
  } finally {
    setButtonsDisabled(false);
  }
}

// ============ 리셋 + 재채우기 ============
async function resetData() {
  if (!confirm('전체 삭제 후 다시 시드 데이터를 채울까요?')) return;
  
  setButtonsDisabled(true);
  clearLog();
  log('$ bounx seed --reset', 'warning');
  log('1단계: 전체 삭제 중...', 'warning');
  
  try {
    await db.ref('bounties').remove();
    log('✓ 삭제 완료', 'success');
    log('', 'info');
    log('2단계: 시드 데이터 재등록...', 'info');
    
    // seedData 호출하되 setButtonsDisabled 중복 호출 방지
    setButtonsDisabled(false); // 임시 해제
    await seedData();
  } catch (e) {
    log('리셋 실패: ' + e.message, 'error');
    setButtonsDisabled(false);
  }
}

// 초기 상태 조회
refreshStatus();
</script>
